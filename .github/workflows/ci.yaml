name: CI/CD

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      # 1. Клонируем репозиторий (GitHub runner сам делает checkout)
      - name: Checkout code
        uses: actions/checkout@v3

      # 2. Настройка SSH для подключения к серверу
      - name: Setup SSH
        uses: webfactory/ssh-agent@v0.8
        with:
           ssh-private-key: ${{ secrets.SSH_KEY }}

      # 3. Подключаемся к серверу и деплоим через docker compose V2
      - name: Deploy to server
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.HOST }}
          username: ${{ secrets.USER }}
          port: 22
          key: ${{ secrets.SSH_KEY }}
          script: |
            # Создаём папку для проекта
            mkdir -p ~/devops-go-app
            cd ~/devops-go-app

            # Обновляем код или клонируем
            if [ -d ".git" ]; then
              git pull
            else
              git clone https://github.com/sonnyranger/devops-go-app .
            fi

            # Строим и поднимаем контейнеры через Docker Compose V2
            docker compose build
            docker compose up -d

            # Выводим статус контейнеров для проверки
            docker compose ps