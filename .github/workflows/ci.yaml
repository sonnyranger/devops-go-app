name: CI/CD Pipeline

on:
  push:
    branches: [main]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v3

      - name: Set up Go
        uses: actions/setup-go@v4
        with:
          go-version: '1.22'

      - name: Build Go app
        run: go build -o todo-app main.go

      - name: Run tests
        run: go test ./...

      - name: Build Docker images
        run: docker compose build

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.HOST }}
          username: ${{ secrets.USER }}
          key: ${{ secrets.SSH_KEY }}
          script: |
            mkdir -p ~/devops-go-app
            cd ~/devops-go-app
            git pull || git clone https://github.com/${{ github.repository }} .
            docker compose up --build --detach