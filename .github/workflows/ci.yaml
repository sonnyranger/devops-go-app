name: CI/CD Pipeline

on:
  push:
    branches: [main]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Go
        uses: actions/setup-go@v4
        with:
          go-version: '1.22'

      - name: Build Go app
        run: go build -o todo-app main.go

      - name: Run tests
        run: go test ./...

      - name: Build Docker image
        run: docker build -t todo-app .

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.HOST }}
          username: ${{ secrets.USER }}
          key: ${{ secrets.SSH_KEY }}
          script: |
            # Создаём директорию для проекта
            mkdir -p ~/devops-go-app
            cd ~/devops-go-app

            # Клонируем или обновляем проект
            git pull || git clone https://github.com/${{ github.repository }} .

            # Билдим Docker
            docker build -t todo-app .

            # Останавливаем старый контейнер
            docker stop todo-app || true
            docker rm todo-app || true

            # Запускаем новый с авто-рестартом
            docker run -d -p 80:8080 --name todo-app --restart always todo-app