name: CI/CD Pipeline

on:
  push:
    branches: ["main"]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: Set up Go
        uses: actions/setup-go@v4
        with:
          go-version: '1.22'

      - name: Install dependencies
        run: go mod download

      - name: Run tests
        run: go test ./... || true

      - name: Build Docker image
        run: docker build -t devops-go-app .

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.HOST }}
          username: ${{ secrets.USER }}
          key: ${{ secrets.SSH_KEY }}
          script: |
            cd ~/devops-go-app || git clone https://github.com/sonnyranger/devops-go-app.git ~/devops-go-app
            cd ~/devops-go-app
            git pull
            docker build -t devops-go-app .
            docker stop app || true
            docker rm app || true
            docker run -d -p 80:8080 --name app devops-go-app