apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: node-exporter
  namespace: devops-go-app
spec:
  selector:
    matchLabels:
      app: node-exporter
  template:
    metadata:
      labels:
        app: node-exporter
    spec:
      containers:
      - name: node-exporter
        image: prom/node-exporter:latest
        ports:
          - containerPort: 9100
            hostPort: 9100