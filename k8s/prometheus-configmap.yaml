apiVersion: v1
kind: ConfigMap
metadata:
  name: prometheus-config
  namespace: devops-go-app
data:
  prometheus.yml: |
    global:
      scrape_interval: 15s
    scrape_configs:
      - job_name: 'go-app'
        static_configs:
          - targets: ['go-app:8080']
      - job_name: 'node-exporter'
        static_configs:
          - targets: ['node-exporter:9100']